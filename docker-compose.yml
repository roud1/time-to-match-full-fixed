services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ttm
      POSTGRES_PASSWORD: ttm_dev_password
      POSTGRES_DB: timetomatch
    ports:
      - "5432:5432"
    volumes:
      - ttm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttm -d timetomatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ttm_pg_data:
